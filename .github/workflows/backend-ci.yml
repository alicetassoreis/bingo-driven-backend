name: Backend CI

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  test:

    runs-on: ubuntu-latest

    services:
      postgres:

        image: postgres:16

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bingo_test

        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bingo_test?schema=public

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npx prisma generate

      - run: npx prisma migrate deploy

      - run: npm test